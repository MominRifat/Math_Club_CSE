{% extends 'base.html' %}

{% block content %}
  <style>
    .success-wrapper {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .success-card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
      max-width: 500px;
      width: 100%;
      text-align: center;
      border: 1px solid #f1f5f9;
    }
    
    .success-icon {
      width: 60px;
      height: 60px;
      background: #ecfdf5;
      color: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px;
    }
    
    .back-btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 30px;
      background: #4f46e5;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .back-btn:hover {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
    }
  </style>

  <div class="success-wrapper">
    <div class="success-card">
      <div class="success-icon">
        <i class="fas fa-check-circle"></i> ✓
      </div>

      <h2 style="color: #0f172a; font-size: 1.5rem; margin-bottom: 10px; font-weight: 800;">Submission Successful!</h2>

      <p style="color: #64748b; font-size: 14px; line-height: 1.6;">
        <strong>{{ quiz.title }}</strong> Recorded Successfully.<br />
      </p>

      <a href="{% url 'quiz' %}" class="back-btn">Back to Portal</a>
    </div>
  </div>
{% endblock %}
